services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${CARBEEP_POSTGRES_DB:-carbeep}
      POSTGRES_USER: ${CARBEEP_POSTGRES_USER:-carbeep}
      POSTGRES_PASSWORD: ${CARBEEP_POSTGRES_PASSWORD:-carbeep}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CARBEEP_POSTGRES_USER:-carbeep}"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file: .env
    volumes:
      - ./logs:/app/bot/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
